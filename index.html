<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Kesiapan IBDP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg: #f3f5fb;
    --card-bg: #ffffff;
    --card-border: #e6e9f2;
    --text: #1e2433;
    --text-dim: #6b7386;
    --header-start: #4338ca;
    --header-end: #2563eb;
    --blue: #2563eb;
    --violet: #7c3aed;
    --amber: #d97706;
    --emerald: #059669;
    --font-display: 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Consolas', 'Courier New', monospace;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
  }
  .header{
    background: linear-gradient(120deg, var(--header-start), var(--header-end));
    color: white;
    padding: 28px 24px;
  }
  .header .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .header h1{ margin: 0; font-size: 26px; font-weight: 700; }
  .header .subtitle{ opacity: 0.85; margin-top: 6px; font-size: 14px; }

  .wrap{ max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

  .config-box{
    background: #fffbea;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #92400e;
  }
  .config-box code{
    color: #92400e;
    font-family: var(--font-mono);
    background: #fef3c7;
    padding: 2px 6px;
    border-radius: 4px;
  }

  #status{ font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }
  #status.error{ color: #dc2626; }
  #status.ok{ color: var(--emerald); }

  .stats-row{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
  }
  .stat-label{ font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .stat-value{ font-size: 24px; font-weight: 700; }

  .search-row{ margin-bottom: 20px; }
  #searchBox{
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--font-display);
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
  }
  #searchBox:focus{ outline: 2px solid var(--blue); outline-offset: 1px; }

  .school-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .school-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 1px 3px rgba(16,24,40,0.06);
  }
  .school-card h3{ margin: 0 0 12px; font-size: 16px; font-weight: 700; }

  .cat-block{
    padding: 8px 0;
    border-bottom: 1px dashed var(--card-border);
  }
  .cat-block:last-of-type{ border-bottom: none; }
  .cat-label{ display:flex; align-items:center; gap: 8px; color: var(--text); font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .dot{ width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .highlight-box{
    background: #f8f9fc;
    border-radius: 8px;
    padding: 8px 10px;
    font-size: 12.5px;
  }
  .highlight-q{ color: var(--text-dim); margin-bottom: 2px; }
  .highlight-a{ font-weight: 700; }
  .highlight-empty{ color: var(--text-dim); font-style: italic; }
  .disclaimer{
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 16px;
    background: #f8f9fc;
    border: 1px solid var(--card-border);
    border-radius: 8px;
    padding: 10px 14px;
  }

  .detail-toggle{
    width: 100%;
    margin-top: 14px;
    background: #eef2ff;
    color: var(--header-start);
    border: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-display);
  }
  .detail-toggle:hover{ background: #e0e7ff; }

  .modal-overlay{
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open{ display: flex; }
  .modal-box{
    background: var(--card-bg);
    border-radius: 16px;
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 24px 26px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    position: relative;
  }
  .modal-close{
    position: sticky;
    top: 0;
    float: right;
    background: #f1f3f9;
    border: none;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    color: var(--text-dim);
  }
  .modal-close:hover{ background: #e6e9f2; }
  .modal-title{ font-size: 18px; font-weight: 700; margin: 0 0 16px; padding-right: 40px; }
  .detail-cat-title{
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
  }
  .qa-item{ font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f1f3f9; }
  .qa-q{ color: var(--text-dim); margin-bottom: 2px; }
  .qa-a{ font-weight: 600; }

  footer{ text-align:center; color: var(--text-dim); font-size: 12px; margin-top: 32px; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Dashboard Survei</div>
  <h1>Kesiapan Otorisasi IBDP</h1>
  <div class="subtitle">Ringkasan self-assessment per sekolah, dikelompokkan berdasarkan area kesiapan.</div>
</div>

<div class="wrap">

  <div id="status">Mengambil data...</div>

  <div class="stats-row" id="statsRow"></div>

  <div class="search-row">
    <input type="text" id="searchBox" placeholder="Cari nama sekolah..." />
  </div>


  <div class="school-grid" id="schoolGrid"></div>

  <footer>Dibuat dengan HTML, di-hosting di Vercel.</footer>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeDetail()">
  <div class="modal-box">
    <button class="modal-close" onclick="closeDetail()">✕</button>
    <div class="modal-title" id="modalTitle"></div>
    <div id="modalBody"></div>
  </div>
</div>

<script>
  // ============================================================
  // GANTI INI dengan link CSV dari Google Sheets kamu
  // (File > Share > Publish to web > pilih format CSV)
  // ============================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSJTcisMHTFP0xtfRr_CSQoBACp9vXq5bEn-UpyRyy8F1qEyrr6NtDIFj6wrXLsSVBwQ1vz2IWUdUp2/pub?output=csv";

  const SCHOOL_COLUMN = "Sebutkan nama sekolah Anda";
  const IGNORE_COLUMNS = ["Timestamp", SCHOOL_COLUMN];

  // Pengelompokan kriteria ke 4 area (murni pengelompokan, bukan penilaian baik/buruk)
  const CATEGORIES = {
    leadership: { label: "Kepemimpinan & SDM", color: "#2563eb" },
    curriculum: { label: "Kurikulum & Pembelajaran", color: "#7c3aed" },
    facility:   { label: "Fasilitas & Teknologi", color: "#d97706" },
    admin:      { label: "Administrasi & Pembiayaan", color: "#059669" },
    other:      { label: "Lainnya", color: "#6b7386" },
  };

  const COLUMN_CATEGORY = {
    "Kepala sekolah memiliki kemampuan Bahasa Inggris aktif": "leadership",
    "Minimal sebagian guru mampu mengajar dalam Bahasa Inggris": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Bahasa Indonesia]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Bahasa Inggris]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Matematika]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Economy]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [History]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Biology]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Chemistry]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Physics]": "leadership",
    "Guru memiliki latar belakang akademik sesuai mata pelajaran": "leadership",
    "Sekolah memiliki guru dengan pengalaman mengajar kurikulum internasional": "leadership",
    "Kepala sekolah pernah mengikuti workshop profesional dari IBDP.": "leadership",
    "Sekolah dapat menunjuk PIC khusus untuk pengembangan IB Diploma Programme.": "leadership",
    "Sekolah memiliki konselor perguruan tinggi dan atau guru bimbingan konseling.": "leadership",
    "Sekolah memiliki staf IT yang mendukung implementasi pembelajaran digital.": "leadership",
    "Sekolah memiliki asisten laboratorium sains.": "leadership",

    "Guru terbiasa membuat perencanaan pembelajaran": "curriculum",
    "Guru terbiasa menggunakan student-centered learning*\n\n*student-centered learning: pembelajaran yang mendorong siswa aktif bertanya, berdiskusi, mengeksplorasi, dan membangun pemahaman sendiri.": "curriculum",
    "Sekolah memiliki sistem pengecekan plagiarisme seperti Turnitin atau Google for Education.": "curriculum",
    "Sekolah memiliki sistem pelaporan hasil belajar siswa.": "curriculum",
    "Sekolah memiliki LMS pembelajaran.": "curriculum",

    "Ruang kelas memiliki proyektor atau smart TV.": "facility",
    "Koneksi internet stabil di area belajar utama.": "facility",
    "Guru memiliki akses laptop atau perangkat digital.": "facility",
    "Siswa kelas 10 sampai 12 memiliki akses perangkat digital untuk pembelajaran.": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab biologi]": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab kimia]": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab fisika]": "facility",
    "Laboratorium memiliki standar keamanan dasar (P3K, APK, selimut api, dll).": "facility",
    "Perpustakaan tersedia.": "facility",
    "Perpustakaan memiliki system pencatatan buku (contoh OPAC).": "facility",
    "Perpustakaan memiliki sumber belajar berbahasa Inggris.": "facility",

    "Sekolah memiliki ruang bimbingan konseling.": "admin",
    "Sekolah memahami estimasi biaya IB": "admin",
    "Sekolah memiliki biaya pengembangan profesional guru": "admin",
  };

  // Kamus kata kunci untuk menebak "seberapa positif" sebuah jawaban (0=kurang, 4=terbaik).
  // Dicocokkan dari frasa terpanjang dulu supaya "belum tersedia" tidak salah kena "tersedia".
  const KEYWORD_RANKS = [
    { kw: "sangat baik", rank: 4 }, { kw: "sangat memadai", rank: 4 },
    { kw: "ada dan aktif digunakan", rank: 4 }, { kw: "tersedia & aktif", rank: 4 },
    { kw: "ada untuk semua lab", rank: 4 }, { kw: "rutin tersedia", rank: 4 },
    { kw: "sudah digunakan secara aktif", rank: 4 }, { kw: "sudah ada pic", rank: 4 },
    { kw: "sudah menggunakan sistem berbayar", rank: 4 }, { kw: "ya, sebagian besar", rank: 4 },
    { kw: "sebagian besar guru", rank: 4 }, { kw: "hampir semua kelas", rank: 4 },
    { kw: "ada keduanya", rank: 4 }, { kw: "ada konselor perguruan tinggi", rank: 4 },
    { kw: "ada guru bimbingan konseling", rank: 4 }, { kw: "lengkap", rank: 4 },
    { kw: ">300 buku", rank: 4 }, { kw: ">75% siswa", rank: 4 },

    { kw: "sudah ada tetapi belum optimal", rank: 3 }, { kw: "sudah ada kandidat", rank: 3 },
    { kw: "sudah menggunakan sistem gratis", rank: 3 }, { kw: "sudah beberapa kali", rank: 3 },
    { kw: "100-200 buku", rank: 3 }, { kw: "50-75% siswa", rank: 3 },
    { kw: "cukup memahami", rank: 3 }, { kw: "memadai", rank: 3 },
    { kw: "baik", rank: 3 }, { kw: "ada", rank: 3 },

    { kw: "ada namun terbatas", rank: 2 }, { kw: "sebagian tersedia", rank: 2 },
    { kw: "sebagian kelas", rank: 2 }, { kw: "ada untuk sebagian lab", rank: 2 },
    { kw: "kadang tersedia", rank: 2 }, { kw: "sebagian kecil guru", rank: 2 },
    { kw: "ya, sebagian kecil", rank: 2 }, { kw: "sedang dipersiapkan", rank: 2 },
    { kw: "sedang merencanakan", rank: 2 }, { kw: "20-50% siswa", rank: 2 },
    { kw: "0-100 buku", rank: 2 }, { kw: "cukup", rank: 2 }, { kw: "tersedia terbatas", rank: 2 },

    { kw: "masih sangat terbatas", rank: 1 }, { kw: "sangat terbatas", rank: 1 },
    { kw: "kurang memahami", rank: 1 }, { kw: "belum memadai", rank: 1 },
    { kw: "perlu pengembangan", rank: 1 }, { kw: "pernah sekali", rank: 1 },
    { kw: "terbatas", rank: 1 },

    { kw: "belum ada sistem", rank: 0 }, { kw: "belum tersedia", rank: 0 },
    { kw: "belum memahami", rank: 0 }, { kw: "belum menentukan", rank: 0 },
    { kw: "tidak ada", rank: 0 }, { kw: "tidak pernah", rank: 0 }, { kw: "belum ada", rank: 0 },
  ].sort((a, b) => b.kw.length - a.kw.length);

  function positivityRank(answer){
    const a = (answer || '').toString().trim().toLowerCase();
    if (!a) return null;
    for (const { kw, rank } of KEYWORD_RANKS){
      if (a.includes(kw)) return rank;
    }
    if (!isNaN(parseFloat(a)) && isFinite(a)) return parseFloat(a); // jawaban angka (mis. skala 1-5)
    return null; // jawaban jenis pilihan biasa, bukan skala bagus/kurang
  }

  function bestAnswerInCategory(row, cols){
    let best = null;
    cols.forEach(col => {
      const val = row[col];
      const rank = positivityRank(val);
      if (rank !== null && (best === null || rank > best.rank)){
        best = { col, val, rank };
      }
    });
    return best;
  }

  const statusEl = document.getElementById('status');
  const statsRow = document.getElementById('statsRow');
  const searchBox = document.getElementById('searchBox');
  const schoolGrid = document.getElementById('schoolGrid');

  let ROWS = [];
  let QUESTION_COLUMNS = [];
  let GROUPED = {}; // catKey -> [columns]
  let DETAILS = {}; // idx -> { name, html }

  function shortLabel(col){
    return col.length > 90 ? col.slice(0, 90) + '…' : col;
  }

  function buildGroups(){
    GROUPED = {};
    Object.keys(CATEGORIES).forEach(k => GROUPED[k] = []);
    QUESTION_COLUMNS.forEach(col => {
      const cat = COLUMN_CATEGORY[col] || "other";
      GROUPED[cat].push(col);
    });
  }

  function renderStats(){
    const schools = new Set(ROWS.map(r => r[SCHOOL_COLUMN])).size;
    const cards = [
      { label: 'Sekolah Mengisi', value: schools },
      { label: 'Jumlah Kriteria', value: QUESTION_COLUMNS.length },
      { label: 'Total Respons', value: ROWS.length },
    ];
    statsRow.innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value">${c.value}</div>
      </div>
    `).join('');
  }

  function schoolCardHTML(row, idx){
    const name = row[SCHOOL_COLUMN] || '(Tanpa nama)';

    const catRows = Object.entries(GROUPED).filter(([k,cols]) => cols.length > 0).map(([key, cols]) => {
      const cat = CATEGORIES[key];
      const best = bestAnswerInCategory(row, cols);
      const highlightHTML = best
        ? `<div class="highlight-box">
             <div class="highlight-q">${shortLabel(best.col)}</div>
             <div class="highlight-a" style="color:${cat.color}">✨ ${best.val}</div>
           </div>`
        : `<div class="highlight-box highlight-empty">Belum ada sorotan otomatis untuk area ini</div>`;
      return `
        <div class="cat-block">
          <div class="cat-label"><span class="dot" style="background:${cat.color}"></span>${cat.label}</div>
          ${highlightHTML}
        </div>`;
    }).join('');

    const detailHTML = Object.entries(GROUPED).filter(([k,cols]) => cols.length > 0).map(([key, cols]) => {
      const cat = CATEGORIES[key];
      const items = cols.map(c => `
        <div class="qa-item">
          <div class="qa-q">${shortLabel(c)}</div>
          <div class="qa-a" style="color:${cat.color}">${row[c] || '(kosong)'}</div>
        </div>
      `).join('');
      return `<div class="detail-cat-title" style="color:${cat.color}">${cat.label}</div>${items}`;
    }).join('');

    DETAILS[idx] = { name, html: detailHTML };

    return `
      <div class="school-card" data-name="${name.toLowerCase()}">
        <h3>${name}</h3>
        ${catRows}
        <button class="detail-toggle" onclick="openDetail(${idx})">Lihat Detail Jawaban</button>
      </div>
    `;
  }

  const modalOverlay = document.getElementById('modalOverlay');
  const modalTitle = document.getElementById('modalTitle');
  const modalBody = document.getElementById('modalBody');

  window.openDetail = function(idx){
    const d = DETAILS[idx];
    modalTitle.textContent = d.name;
    modalBody.innerHTML = d.html;
    modalOverlay.classList.add('open');
    document.body.style.overflow = 'hidden';
  };

  window.closeDetail = function(){
    modalOverlay.classList.remove('open');
    document.body.style.overflow = '';
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') closeDetail();
  });

  function renderGrid(filterText){
    const filtered = ROWS.filter(r =>
      !filterText || (r[SCHOOL_COLUMN] || '').toLowerCase().includes(filterText.toLowerCase())
    );
    schoolGrid.innerHTML = filtered.map((r, i) => schoolCardHTML(r, i)).join('');
  }

  searchBox.addEventListener('input', () => renderGrid(searchBox.value));

  function loadData(){
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        ROWS = results.data;
        if (!ROWS.length){
          statusEl.textContent = 'Data kosong. Cek lagi link CSV kamu.';
          statusEl.className = 'error';
          return;
        }
        QUESTION_COLUMNS = results.meta.fields.filter(c => !IGNORE_COLUMNS.includes(c));
        buildGroups();
        statusEl.textContent = `Berhasil memuat ${ROWS.length} respons dari sekolah.`;
        statusEl.className = 'ok';

        renderStats();
        renderGrid('');
      },
      error: function(err){
        statusEl.textContent = 'Gagal mengambil data: ' + err.message + '. Pastikan link CSV benar dan sheet sudah di-publish.';
        statusEl.className = 'error';
      }
    });
  }

  loadData();
</script>
</body>
</html>
