<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Dashboard Kesiapan IBDP</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<style>
  :root{
    --bg: #f3f5fb;
    --card-bg: #ffffff;
    --card-border: #e6e9f2;
    --text: #1e2433;
    --text-dim: #6b7386;
    --header-start: #4338ca;
    --header-end: #2563eb;
    --blue: #2563eb;
    --violet: #7c3aed;
    --amber: #d97706;
    --emerald: #059669;
    --font-display: 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'Consolas', 'Courier New', monospace;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-display);
    min-height: 100vh;
  }
  .header{
    background: linear-gradient(120deg, var(--header-start), var(--header-end));
    color: white;
    padding: 28px 24px;
  }
  .header .eyebrow{
    font-family: var(--font-mono);
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.8;
    margin-bottom: 6px;
  }
  .header h1{ margin: 0; font-size: 26px; font-weight: 700; }
  .header .subtitle{ opacity: 0.85; margin-top: 6px; font-size: 14px; }

  .wrap{ max-width: 1200px; margin: 0 auto; padding: 24px 20px 60px; }

  .config-box{
    background: #fffbea;
    border: 1px solid #fde68a;
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    color: #92400e;
  }
  .config-box code{
    color: #92400e;
    font-family: var(--font-mono);
    background: #fef3c7;
    padding: 2px 6px;
    border-radius: 4px;
  }

  #status{ font-family: var(--font-mono); font-size: 13px; color: var(--text-dim); margin-bottom: 18px; }
  #status.error{ color: #dc2626; }
  #status.ok{ color: var(--emerald); }

  .stats-row{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 14px;
    margin-bottom: 20px;
  }
  .stat-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    padding: 16px 18px;
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
  }
  .stat-label{ font-size: 11px; letter-spacing: 1px; text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px; }
  .stat-value{ font-size: 24px; font-weight: 700; }

  .search-row{ margin-bottom: 20px; }
  #searchBox{
    width: 100%;
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 14px;
    font-family: var(--font-display);
    box-shadow: 0 1px 2px rgba(16,24,40,0.04);
  }
  #searchBox:focus{ outline: 2px solid var(--blue); outline-offset: 1px; }

  .school-grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 16px;
  }
  .school-card{
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 1px 3px rgba(16,24,40,0.06);
  }
  .school-card h3{ margin: 0 0 12px; font-size: 16px; font-weight: 700; }

  .cat-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
    padding: 6px 0;
    border-bottom: 1px dashed var(--card-border);
  }
  .cat-row:last-of-type{ border-bottom: none; }
  .cat-label{ display:flex; align-items:center; gap: 8px; color: var(--text); }
  .dot{ width: 9px; height: 9px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .cat-count{ color: var(--text-dim); font-family: var(--font-mono); font-size: 12px; }

  .detail-toggle{
    width: 100%;
    margin-top: 14px;
    background: #eef2ff;
    color: var(--header-start);
    border: none;
    padding: 9px 12px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font-display);
  }
  .detail-toggle:hover{ background: #e0e7ff; }

  .detail-panel{ display:none; margin-top: 14px; }
  .detail-panel.open{ display:block; }
  .detail-cat-title{
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin: 14px 0 6px;
  }
  .qa-item{ font-size: 13px; padding: 6px 0; border-bottom: 1px solid #f1f3f9; }
  .qa-q{ color: var(--text-dim); margin-bottom: 2px; }
  .qa-a{ font-weight: 600; }

  footer{ text-align:center; color: var(--text-dim); font-size: 12px; margin-top: 32px; }
</style>
</head>
<body>

<div class="header">
  <div class="eyebrow">Dashboard Survei</div>
  <h1>Kesiapan Otorisasi IBDP</h1>
  <div class="subtitle">Hasil survey mandiri kesiapan implementasi IBDP di MAN IC seluruh Indonesia.</div>
</div>

<div class="wrap">

  

  <div id="status">Mengambil data...</div>

  <div class="stats-row" id="statsRow"></div>

  <div class="search-row">
    <input type="text" id="searchBox" placeholder="Cari nama sekolah..." />
  </div>

  <div class="school-grid" id="schoolGrid"></div>

  <footer>Dibuat dengan HTML, di-hosting di Vercel.</footer>
</div>

<script>
  // ============================================================
  // GANTI INI dengan link CSV dari Google Sheets kamu
  // (File > Share > Publish to web > pilih format CSV)
  // ============================================================
  const SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTw7LMGC2kouIIudvFQ92fjDoD7-YQGGe4WizeTgf1uvR5pDg1biJLeBCDZBUgxUYDUOE0oftjluTLA/pub?output=csv";

  const SCHOOL_COLUMN = "Sebutkan nama sekolah Anda";
  const IGNORE_COLUMNS = ["Timestamp", SCHOOL_COLUMN];

  // Pengelompokan kriteria ke 4 area (murni pengelompokan, bukan penilaian baik/buruk)
  const CATEGORIES = {
    leadership: { label: "Kepemimpinan & SDM", color: "#2563eb" },
    curriculum: { label: "Kurikulum & Pembelajaran", color: "#7c3aed" },
    facility:   { label: "Fasilitas & Teknologi", color: "#d97706" },
    admin:      { label: "Administrasi & Pembiayaan", color: "#059669" },
    other:      { label: "Lainnya", color: "#6b7386" },
  };

  const COLUMN_CATEGORY = {
    "Kepala sekolah memiliki kemampuan Bahasa Inggris aktif": "leadership",
    "Minimal sebagian guru mampu mengajar dalam Bahasa Inggris": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Bahasa Indonesia]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Bahasa Inggris]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Matematika]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Economy]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [History]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Biology]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Chemistry]": "leadership",
    "Sekolah memiliki guru untuk mata pelajaran berikut [Physics]": "leadership",
    "Guru memiliki latar belakang akademik sesuai mata pelajaran": "leadership",
    "Sekolah memiliki guru dengan pengalaman mengajar kurikulum internasional": "leadership",
    "Kepala sekolah pernah mengikuti workshop profesional dari IBDP.": "leadership",
    "Sekolah dapat menunjuk PIC khusus untuk pengembangan IB Diploma Programme.": "leadership",
    "Sekolah memiliki konselor perguruan tinggi dan atau guru bimbingan konseling.": "leadership",
    "Sekolah memiliki staf IT yang mendukung implementasi pembelajaran digital.": "leadership",
    "Sekolah memiliki asisten laboratorium sains.": "leadership",

    "Guru terbiasa membuat perencanaan pembelajaran": "curriculum",
    "Guru terbiasa menggunakan student-centered learning*\n\n*student-centered learning: pembelajaran yang mendorong siswa aktif bertanya, berdiskusi, mengeksplorasi, dan membangun pemahaman sendiri.": "curriculum",
    "Sekolah memiliki sistem pengecekan plagiarisme seperti Turnitin atau Google for Education.": "curriculum",
    "Sekolah memiliki sistem pelaporan hasil belajar siswa.": "curriculum",
    "Sekolah memiliki LMS pembelajaran.": "curriculum",

    "Ruang kelas memiliki proyektor atau smart TV.": "facility",
    "Koneksi internet stabil di area belajar utama.": "facility",
    "Guru memiliki akses laptop atau perangkat digital.": "facility",
    "Siswa kelas 10 sampai 12 memiliki akses perangkat digital untuk pembelajaran.": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab biologi]": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab kimia]": "facility",
    "Laboratorium sains tersedia dan dapat digunakan. [Lab fisika]": "facility",
    "Laboratorium memiliki standar keamanan dasar (P3K, APK, selimut api, dll).": "facility",
    "Perpustakaan tersedia.": "facility",
    "Perpustakaan memiliki system pencatatan buku (contoh OPAC).": "facility",
    "Perpustakaan memiliki sumber belajar berbahasa Inggris.": "facility",

    "Sekolah memiliki ruang bimbingan konseling.": "admin",
    "Sekolah memahami estimasi biaya IB": "admin",
    "Sekolah memiliki biaya pengembangan profesional guru": "admin",
  };

  const statusEl = document.getElementById('status');
  const statsRow = document.getElementById('statsRow');
  const searchBox = document.getElementById('searchBox');
  const schoolGrid = document.getElementById('schoolGrid');

  let ROWS = [];
  let QUESTION_COLUMNS = [];
  let GROUPED = {}; // catKey -> [columns]

  function shortLabel(col){
    return col.length > 90 ? col.slice(0, 90) + '…' : col;
  }

  function buildGroups(){
    GROUPED = {};
    Object.keys(CATEGORIES).forEach(k => GROUPED[k] = []);
    QUESTION_COLUMNS.forEach(col => {
      const cat = COLUMN_CATEGORY[col] || "other";
      GROUPED[cat].push(col);
    });
  }

  function renderStats(){
    const schools = new Set(ROWS.map(r => r[SCHOOL_COLUMN])).size;
    const cards = [
      { label: 'Sekolah Mengisi', value: schools },
      { label: 'Jumlah Kriteria', value: QUESTION_COLUMNS.length },
      { label: 'Total Respons', value: ROWS.length },
    ];
    statsRow.innerHTML = cards.map(c => `
      <div class="stat-card">
        <div class="stat-label">${c.label}</div>
        <div class="stat-value">${c.value}</div>
      </div>
    `).join('');
  }

  function schoolCardHTML(row, idx){
    const name = row[SCHOOL_COLUMN] || '(Tanpa nama)';

    const catRows = Object.entries(GROUPED).filter(([k,cols]) => cols.length > 0).map(([key, cols]) => {
      const filled = cols.filter(c => (row[c] || '').toString().trim() !== '').length;
      const cat = CATEGORIES[key];
      return `
        <div class="cat-row">
          <span class="cat-label"><span class="dot" style="background:${cat.color}"></span>${cat.label}</span>
          <span class="cat-count">${filled}/${cols.length} terisi</span>
        </div>`;
    }).join('');

    const detailHTML = Object.entries(GROUPED).filter(([k,cols]) => cols.length > 0).map(([key, cols]) => {
      const cat = CATEGORIES[key];
      const items = cols.map(c => `
        <div class="qa-item">
          <div class="qa-q">${shortLabel(c)}</div>
          <div class="qa-a" style="color:${cat.color}">${row[c] || '(kosong)'}</div>
        </div>
      `).join('');
      return `<div class="detail-cat-title" style="color:${cat.color}">${cat.label}</div>${items}`;
    }).join('');

    return `
      <div class="school-card" data-name="${name.toLowerCase()}">
        <h3>${name}</h3>
        ${catRows}
        <button class="detail-toggle" onclick="toggleDetail(${idx})">Lihat Detail Jawaban</button>
        <div class="detail-panel" id="detail-${idx}">${detailHTML}</div>
      </div>
    `;
  }

  window.toggleDetail = function(idx){
    document.getElementById('detail-' + idx).classList.toggle('open');
  };

  function renderGrid(filterText){
    const filtered = ROWS.filter(r =>
      !filterText || (r[SCHOOL_COLUMN] || '').toLowerCase().includes(filterText.toLowerCase())
    );
    schoolGrid.innerHTML = filtered.map((r, i) => schoolCardHTML(r, i)).join('');
  }

  searchBox.addEventListener('input', () => renderGrid(searchBox.value));

  function loadData(){
    Papa.parse(SHEET_CSV_URL, {
      download: true,
      header: true,
      skipEmptyLines: true,
      complete: function(results){
        ROWS = results.data;
        if (!ROWS.length){
          statusEl.textContent = 'Data kosong. Cek lagi link CSV kamu.';
          statusEl.className = 'error';
          return;
        }
        QUESTION_COLUMNS = results.meta.fields.filter(c => !IGNORE_COLUMNS.includes(c));
        buildGroups();
        statusEl.textContent = `Berhasil memuat ${ROWS.length} respons dari sekolah.`;
        statusEl.className = 'ok';

        renderStats();
        renderGrid('');
      },
      error: function(err){
        statusEl.textContent = 'Gagal mengambil data: ' + err.message + '. Pastikan link CSV benar dan sheet sudah di-publish.';
        statusEl.className = 'error';
      }
    });
  }

  loadData();
</script>
</body>
</html>
